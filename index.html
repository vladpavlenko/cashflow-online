<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="CashFlow Online">
  <meta name="theme-color" content="#08090f">
  <title>CashFlow Online</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="cards.js"></script>
  <script src="board.js"></script>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getDatabase, ref, set, get, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

    const firebaseConfig = {
      apiKey: "AIzaSyAOjnui8wVleQ-pNbGculhezKHrnEgLQcw",
      authDomain: "cashflow-ua.firebaseapp.com",
      databaseURL: "https://cashflow-ua-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "cashflow-ua",
      storageBucket: "cashflow-ua.firebasestorage.app",
      messagingSenderId: "883578570835",
      appId: "1:883578570835:web:dc441ce423516663575ea6"
    };

    try {
      const app = initializeApp(firebaseConfig);
      const db  = getDatabase(app);
      window._db        = db;
      window._fbSet     = set;
      window._fbRef     = ref;
      window._fbGet     = get;
      window._fbOnValue = onValue;
    } catch(e) {
      console.warn('Firebase init failed:', e.message);
    }

    window.addEventListener('beforeunload', () => {
      if (window._mySessionId && window._myPlayerKey && window._db) {
        try {
          set(ref(window._db, `sessions/${window._mySessionId}/players/${window._myPlayerKey}/online`), false);
        } catch(_) {}
      }
    });
  </script>

  <style>
    :root {
      --bg:   #08090f; --surf: #111420; --elev: #1a1e30; --bord: #252840;
      --gold: #f5a623; --green: #22c55e; --red: #ef4444; --blue: #60a5fa;
      --text: #e8ecf5; --sub:  #8892aa;
      --body: 'DM Sans', system-ui, sans-serif;
      --mono: 'IBM Plex Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { height: -webkit-fill-available; }
    body {
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 20% 10%, rgba(30,40,90,0.5) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 90%, rgba(20,25,60,0.4) 0%, transparent 55%);
      background-attachment: fixed;
      color: var(--text);
      font-family: var(--body);
      min-height: 100vh;
      min-height: -webkit-fill-available;
      padding: 20px 16px 48px;
      max-width: 480px;
      margin: 0 auto;
    }
    .hidden { display: none !important; }

    /* ── Logo ── */
    .logo {
      font-family: Georgia, serif; font-size: 36px; font-weight: 700;
      color: var(--gold); text-align: center; margin-bottom: 6px; line-height: 1.1;
    }
    .logo span {
      display: block; font-size: 11px; letter-spacing: 6px;
      color: var(--sub); font-family: var(--body); font-weight: 400;
      text-transform: uppercase; margin-top: 4px;
    }

    /* ── Lobby screen ── */
    #screen-lobby { padding-top: 60px; }
    .logo-wrap { margin-bottom: 36px; }

    .form-card {
      background: var(--surf); border: 1px solid var(--bord);
      border-radius: 18px; padding: 22px; display: flex; flex-direction: column; gap: 12px;
    }
    .form-card input {
      background: var(--elev); border: 1.5px solid var(--bord); border-radius: 12px;
      padding: 14px 16px; color: var(--text); font-family: var(--body); font-size: 16px;
      outline: none; width: 100%; transition: border-color 0.2s;
    }
    .form-card input:focus { border-color: var(--gold); }
    #inp-code {
      font-family: var(--mono); font-size: 22px; font-weight: 600;
      letter-spacing: 5px; text-align: center; text-transform: uppercase;
    }
    #btn-join {
      width: 100%; padding: 16px;
      background: linear-gradient(180deg, #2d4a8a 0%, #1e3570 100%);
      border: none; border-radius: 14px; color: #fff;
      font-family: var(--body); font-size: 16px; font-weight: 700; cursor: pointer;
      box-shadow: 0 4px 20px rgba(30,53,112,0.4); transition: transform 0.1s;
    }
    #btn-join:active { transform: scale(0.98); }
    .error { color: var(--red); font-size: 13px; text-align: center; }

    /* ── Game header ── */
    #game-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0 14px; margin-bottom: 14px;
      border-bottom: 1px solid var(--bord);
    }
    #hdr-name  { font-size: 16px; font-weight: 700; }
    #hdr-round { font-size: 12px; color: var(--sub); }
    #hdr-cash  { font-family: var(--mono); font-size: 22px; font-weight: 700; color: var(--gold); }

    /* ── Turn status ── */
    #turn-status {
      text-align: center; padding: 14px; border-radius: 14px;
      font-size: 15px; font-weight: 600; margin-bottom: 12px;
    }
    .status-waiting {
      background: var(--surf); color: var(--sub); border: 1px solid var(--bord);
    }
    .status-my-turn {
      background: rgba(245,166,35,0.10); color: var(--gold);
      border: 1.5px solid rgba(245,166,35,0.4);
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(245,166,35,0); }
      50%      { box-shadow: 0 0 0 8px rgba(245,166,35,0.15); }
    }

    /* ── Dice button ── */
    #btn-roll {
      width: 100%; padding: 20px; border: none; border-radius: 16px;
      background: var(--gold); color: #08090f;
      font-family: var(--body); font-size: 20px; font-weight: 800;
      cursor: pointer; margin-bottom: 12px;
      box-shadow: 0 4px 24px rgba(245,166,35,0.35);
      transition: transform 0.1s, opacity 0.1s;
    }
    #btn-roll:active   { transform: scale(0.97); }
    #btn-roll:disabled {
      background: var(--elev); color: var(--sub);
      box-shadow: none; cursor: not-allowed; transform: none;
    }

    /* ── Roll result ── */
    #roll-result {
      text-align: center; padding: 20px;
      background: var(--surf); border: 1px solid var(--bord); border-radius: 14px;
      margin-bottom: 12px; animation: fadeUp 0.3s ease;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
    #roll-dice-val {
      font-family: var(--mono); font-size: 56px; font-weight: 700;
      color: var(--gold); line-height: 1;
    }
    #roll-cell-name { font-size: 18px; font-weight: 700; margin-top: 8px; }

    /* ── Card area ── */
    #card-area {
      background: var(--surf); border: 1.5px solid var(--bord);
      border-radius: 18px; padding: 18px; margin-bottom: 12px;
      animation: fadeUp 0.3s ease;
    }
    #card-type-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 2px;
      color: var(--sub); margin-bottom: 8px;
    }
    #card-name   { font-size: 20px; font-weight: 700; margin-bottom: 10px; }
    #card-details {
      font-size: 14px; color: var(--sub); line-height: 1.7;
      white-space: pre-line; margin-bottom: 8px;
    }
    #card-requirements { font-size: 12px; color: var(--red); margin-bottom: 14px; min-height: 0; }

    #card-actions { display: flex; gap: 10px; }
    #btn-accept {
      flex: 1; padding: 14px; border-radius: 13px;
      background: linear-gradient(180deg, #1f5c3a, #144028);
      border: none; color: #4ade80;
      font-family: var(--body); font-size: 15px; font-weight: 700; cursor: pointer;
      transition: opacity 0.15s;
    }
    #btn-accept:active { opacity: 0.8; }
    #btn-decline {
      flex: 1; padding: 14px; border-radius: 13px;
      background: rgba(239,68,68,0.08); border: 1.5px solid rgba(239,68,68,0.28);
      color: var(--red); font-family: var(--body); font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    #btn-decline:active { background: rgba(239,68,68,0.15); }
    #card-decided { text-align: center; padding: 14px; font-size: 15px; font-weight: 600; color: var(--sub); }

    /* ── My state ── */
    #my-state {
      background: var(--surf); border: 1px solid var(--bord);
      border-radius: 14px; padding: 14px; display: flex; flex-direction: column; gap: 6px;
    }
    .state-section-title {
      font-size: 10px; text-transform: uppercase; letter-spacing: 2px;
      color: var(--sub); padding-bottom: 4px;
    }
    .state-row {
      display: flex; justify-content: space-between;
      font-size: 13px; padding: 6px 0;
      border-bottom: 1px solid var(--bord);
    }
    .state-row:last-child { border-bottom: none; }
    .state-lbl { color: var(--sub); }
    .state-val  { font-weight: 600; font-family: var(--mono); }

    /* ── Card Type Modal ── */
    #card-type-modal {
      position: fixed; inset: 0; background: var(--bg); z-index: 200;
      display: flex; flex-direction: column; overflow-y: auto;
      padding: 32px 16px 48px;
    }
    #card-type-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px;
    }
    .card-choice-btn {
      background: var(--surf); border: 1.5px solid var(--bord);
      border-radius: 14px; overflow: hidden; cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
      text-align: left; padding: 0;
    }
    .card-choice-btn:active { transform: scale(0.97); border-color: var(--gold); }
    .card-choice-img { width: 100%; height: 120px; object-fit: cover; display: block; }
    .card-choice-placeholder {
      width: 100%; height: 120px;
      align-items: center; justify-content: center; font-size: 36px;
    }
    .card-choice-label { padding: 10px; font-size: 13px; font-weight: 700; text-align: center; }
    .card-choice-btn.span-2 { grid-column: 1 / -1; }
    #btn-cancel-choice {
      background: none; border: none; color: var(--sub); font-size: 12px;
      cursor: pointer; text-align: center; padding: 12px;
      text-decoration: underline; font-family: var(--body);
    }
  </style>
</head>
<body>

<!-- ══ LOBBY SCREEN ══ -->
<div id="screen-lobby">
  <div class="logo-wrap">
    <div class="logo">CashFlow<span>ONLINE</span></div>
  </div>

  <div class="form-card">
    <input id="inp-name" type="text"
           placeholder="Твоє ім'я" maxlength="20" autocomplete="off">
    <input id="inp-code" type="text"
           placeholder="Код сесії (6 символів)"
           maxlength="6" autocomplete="off"
           oninput="this.value=this.value.toUpperCase()">
    <button id="btn-join" onclick="joinGame()">Увійти в гру →</button>
    <div id="join-error" class="error hidden"></div>
  </div>
</div>

<!-- ══ GAME SCREEN ══ -->
<div id="screen-game" class="hidden">

  <div id="game-header">
    <div id="hdr-name"></div>
    <div id="hdr-round">Раунд 1</div>
    <div id="hdr-cash">$500</div>
  </div>

  <div id="turn-status" class="status-waiting">
    ⏳ Очікуй свого ходу...
  </div>

  <button id="btn-roll" onclick="rollDice()" disabled>
    🎲 Кинути кубик
  </button>

  <div id="roll-result" class="hidden">
    <div id="roll-dice-val"></div>
    <div id="roll-cell-name"></div>
  </div>

  <div id="card-area" class="hidden">
    <div id="card-type-label"></div>
    <div id="card-name"></div>
    <div id="card-details"></div>
    <div id="card-requirements"></div>

    <div id="card-actions">
      <button id="btn-accept"  onclick="decide('accept')">✅ Прийняти</button>
      <button id="btn-decline" onclick="decide('decline')">❌ Відмовитись</button>
    </div>

    <div id="card-decided" class="hidden">
      <div id="decided-text"></div>
    </div>
  </div>

  <div id="my-state">
    <div id="my-incomes"></div>
    <div id="my-courses"></div>
    <div id="my-loans"></div>
  </div>

</div>

<!-- ══ CARD TYPE MODAL ══ -->
<div id="card-type-modal" class="hidden">
  <div style="text-align:center;margin-bottom:4px;font-size:13px;color:var(--sub)">Ти потрапив на</div>
  <div id="modal-cell-label" style="font-size:28px;font-weight:800;text-align:center;color:var(--gold);margin-bottom:8px"></div>
  <div style="font-size:16px;font-weight:600;text-align:center;margin-bottom:24px;color:var(--text)">Яку картку тягнеш?</div>
  <div id="card-type-grid"></div>
  <button id="btn-cancel-choice" onclick="cancelCardChoice()">Я передумав</button>
</div>

<script>
let _db          = null;
let _sessionId   = null;
let _myPlayerKey = null;
let _myName      = null;
let _myTurn      = false;
let _state       = 'lobby'; // 'lobby'|'waiting'|'my_turn'|'rolled'|'card'

const CARD_CHOICES = {
  dela: [
    { type: 'emp',     label: 'Робота на дядю',      img: 'assets/cards/job_employee.png',  icon: '💼', bg: '#1e3570' },
    { type: 'self',    label: 'Робота на себе',       img: 'assets/cards/job_self.png',      icon: '🧑‍💻', bg: '#1a4a3a' },
    { type: 'random',  label: 'Випадковий заробіток', img: 'assets/cards/random_income.png', icon: '💰', bg: '#4a3810' },
    { type: 'deal',    label: 'Купи-Продай',          img: 'assets/cards/deal.png',          icon: '🤝', bg: '#3a1040' },
    { type: 'startup', label: 'Стартапи і кейси',     img: 'assets/cards/startup.png',       icon: '🚀', bg: '#102040' },
  ],
  trening: [
    { type: 'course',   label: 'Курс',    img: 'assets/cards/course.png',   icon: '📖', bg: '#1e3570' },
    { type: 'training', label: 'Тренінг', img: 'assets/cards/training.png', icon: '🧠', bg: '#1a4a3a' },
  ],
};

const CARD_TYPE_LABELS = {
  emp:      '💼 Робота на дядю',
  self:     '🧑‍💻 Робота на себе',
  random:   '💰 Випадковий заробіток',
  deal:     '🤝 Купи-Продай',
  startup:  '🚀 Стартап / Кейс',
  course:   '📖 Курс',
  training: '🧠 Тренінг',
  expense:  '💸 Опять расходы',
  uvolen:   '🔥 Ти звільнений',
  lyubov:   '💍 Любовь',
  rebenok:  '👶 Ребенок',
  poluchka: '🏁 День зарплати',
};

async function joinGame() {
  const name  = document.getElementById('inp-name').value.trim();
  const code  = document.getElementById('inp-code').value.trim().toUpperCase();
  const errEl = document.getElementById('join-error');
  errEl.classList.add('hidden');

  if (!name)          { errEl.textContent = "Введи ім'я";              errEl.classList.remove('hidden'); return; }
  if (code.length < 2) { errEl.textContent = 'Введи код сесії'; errEl.classList.remove('hidden'); return; }
  if (!window._db)     { errEl.textContent = 'Firebase не підключено — перевір мережу'; errEl.classList.remove('hidden'); return; }

  _db = window._db;

  // Перевірити чи існує сесія
  let snap;
  try {
    snap = await window._fbGet(window._fbRef(_db, `sessions/${code}/status`));
  } catch(e) {
    errEl.textContent = 'Помилка мережі: ' + e.message;
    errEl.classList.remove('hidden'); return;
  }
  if (!snap.exists()) {
    errEl.textContent = 'Сесію не знайдено. Перевір код.';
    errEl.classList.remove('hidden'); return;
  }

  _sessionId   = code;
  _myName      = name;
  _myPlayerKey = name.trim().replace(/\s+/g, '_').replace(/[^a-zA-Zа-яА-ЯіІєЄ0-9_]/g, '');

  try {
    await window._fbJoinSession(_db, _sessionId, _myPlayerKey, _myName);
  } catch(e) {
    errEl.textContent = 'Помилка підключення: ' + e.message;
    errEl.classList.remove('hidden'); return;
  }

  // Зберегти для beforeunload
  window._mySessionId = _sessionId;
  window._myPlayerKey = _myPlayerKey;

  document.getElementById('screen-lobby').classList.add('hidden');
  document.getElementById('screen-game').classList.remove('hidden');
  document.getElementById('hdr-name').textContent = _myName;

  startListeners();
}

function startListeners() {
  window._fbListenTurn(_db, _sessionId, _myPlayerKey, (isMyTurn) => {
    _myTurn = isMyTurn;
    if (isMyTurn) {
      setState('my_turn');
    } else if (_state === 'my_turn') {
      setState('waiting');
    }
  });

  window._fbListenCard(_db, _sessionId, _myPlayerKey, (data) => {
    if (data?.card) showCard(data.card, data.cardType);
  });

  window._fbOnValue(window._fbRef(_db, `sessions/${_sessionId}`), (snap) => {
    const session = snap.val();
    if (!session) return;
    document.getElementById('hdr-round').textContent = `Раунд ${session.round || 1}`;
    // Скинути картку і результат якщо GM розпочав новий хід
    if (!session.currentCard && _state === 'card') {
      setState('waiting');
    }
  });

  window._fbOnValue(window._fbRef(_db, `sessions/${_sessionId}/players/${_myPlayerKey}`), (snap) => {
    const p = snap.val();
    if (!p) return;
    document.getElementById('hdr-cash').textContent = `$${Math.round(p.cash || 0)}`;
    renderMyState(p);
  });
}

function setState(state) {
  _state = state;
  const statusEl = document.getElementById('turn-status');
  const rollBtn  = document.getElementById('btn-roll');

  document.getElementById('roll-result').classList.add('hidden');
  document.getElementById('card-area').classList.add('hidden');

  switch (state) {
    case 'waiting':
      statusEl.className   = 'status-waiting';
      statusEl.textContent = '⏳ Очікуй свого ходу...';
      rollBtn.disabled = true;
      break;

    case 'my_turn':
      statusEl.className   = 'status-my-turn';
      statusEl.textContent = '⚡ Твій хід! Кидай кубик';
      rollBtn.disabled = false;
      break;

    case 'rolled':
      statusEl.className   = 'status-waiting';
      statusEl.textContent = '🎲 Кубик кинуто — чекаємо картку...';
      rollBtn.disabled = true;
      document.getElementById('roll-result').classList.remove('hidden');
      break;

    case 'card':
      statusEl.className   = 'status-waiting';
      statusEl.textContent = '🃏 Прийми рішення по картці';
      rollBtn.disabled = true;
      document.getElementById('card-area').classList.remove('hidden');
      document.getElementById('card-actions').classList.remove('hidden');
      document.getElementById('card-decided').classList.add('hidden');
      break;
  }
}

async function rollDice() {
  if (!_myTurn || _state !== 'my_turn') return;

  const btn = document.getElementById('btn-roll');
  btn.disabled = true;
  btn.textContent = '⏳';

  const result = await window._fbRollDice(_db, _sessionId, _myPlayerKey);
  btn.textContent = '🎲 Кинути кубик';
  if (!result) { setState('waiting'); return; }

  document.getElementById('roll-dice-val').textContent  = result.dice;
  document.getElementById('roll-cell-name').textContent = result.cell.label;
  setState('rolled');

  if (result.cell.type === 'dela' || result.cell.type === 'trening') {
    showCardTypeModal(result.cell.type, result.cell.label);
  }
}

function showCardTypeModal(cellType, cellLabel) {
  const choices = CARD_CHOICES[cellType];
  if (!choices) return;

  document.getElementById('modal-cell-label').textContent = cellLabel || cellType.toUpperCase();

  const grid = document.getElementById('card-type-grid');
  grid.innerHTML = choices.map((c, i) => {
    const isOddLast = choices.length % 2 !== 0 && i === choices.length - 1;
    return `
      <button class="card-choice-btn${isOddLast ? ' span-2' : ''}" onclick="playerChooseCardType('${c.type}')">
        <img class="card-choice-img" src="${c.img}" alt="${c.label}"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="card-choice-placeholder" style="background:${c.bg};display:none">${c.icon}</div>
        <div class="card-choice-label">${c.label}</div>
      </button>`;
  }).join('');

  document.getElementById('card-type-modal').classList.remove('hidden');
}

async function playerChooseCardType(cardType) {
  document.getElementById('card-type-modal').classList.add('hidden');

  const statusEl = document.getElementById('turn-status');
  statusEl.className = 'status-waiting';
  statusEl.textContent = '⏳ Чекаємо картку від GM...';

  await window._fbSet(
    window._fbRef(_db, `sessions/${_sessionId}/cardTypeRequest`),
    { playerKey: _myPlayerKey, cardType, ts: Date.now() }
  );
}

function cancelCardChoice() {
  document.getElementById('card-type-modal').classList.add('hidden');
}

function showCard(card, cardType) {
  document.getElementById('card-type-label').textContent =
    CARD_TYPE_LABELS[cardType] || cardType;

  document.getElementById('card-name').textContent = card.name || '—';

  let details = '';
  if (card.pay)    details += `Дохід: $${card.pay}/міс\n`;
  if (card.amount) details += `Сума: +$${card.amount}\n`;
  if (card.invest) details += `Вкладення: $${card.invest}\n`;
  if (card.pct)    details += `Пасивний дохід: $${Math.round(card.invest * card.pct)}/міс\n`;
  if (card.mult)   details += `Прибуток: +$${Math.round(card.invest * card.mult)}\n`;
  if (card.term)   details += `Термін: ${card.term} міс.\n`;
  if (card.cost)   details += `Вартість: $${card.cost}\n`;
  if (card.effect) details += card.effect;
  document.getElementById('card-details').textContent = details.trim();

  const reqs = card.req || card.requirements || [];
  document.getElementById('card-requirements').textContent =
    reqs.length ? `⚠ Вимоги: ${reqs.join(', ')}` : '';

  const autoTypes = ['uvolen','lyubov','rebenok','poluchka','expense'];
  if (autoTypes.includes(cardType)) {
    document.getElementById('card-actions').classList.add('hidden');
    document.getElementById('card-decided').classList.remove('hidden');
    document.getElementById('decided-text').textContent = 'Подія застосована автоматично';
  }

  setState('card');
}

async function decide(decision) {
  await window._fbPlayerDecision(_db, _sessionId, _myPlayerKey, decision);

  document.getElementById('card-actions').classList.add('hidden');
  document.getElementById('card-decided').classList.remove('hidden');
  document.getElementById('decided-text').textContent =
    decision === 'accept' ? '✅ Ти прийняв' : '❌ Ти відмовився';
  // card-area stays visible until GM grants next turn
}

function renderMyState(p) {
  const incomesEl = document.getElementById('my-incomes');
  const coursesEl = document.getElementById('my-courses');
  const loansEl   = document.getElementById('my-loans');

  const incomes = p.incomes || [];
  incomesEl.innerHTML = incomes.length
    ? `<div class="state-section-title">Доходи</div>` +
      incomes.map(i =>
        `<div class="state-row">
           <span class="state-lbl">${i.name}</span>
           <span class="state-val" style="color:var(--green)">$${i.basePay || i.pay}/міс</span>
         </div>`
      ).join('')
    : `<div class="state-row"><span class="state-lbl" style="color:var(--sub)">Доходів ще немає</span></div>`;

  const courses = p.courses || [];
  coursesEl.innerHTML = courses.length
    ? `<div class="state-section-title" style="margin-top:6px">Курси</div>` +
      courses.map(c =>
        `<div class="state-row">
           <span class="state-lbl">${c.name}</span>
           <span class="state-val" style="color:var(--blue)">${c.field || ''}</span>
         </div>`
      ).join('')
    : '';

  const bank  = p.loans?.bankRem  || 0;
  const micro = p.loans?.microRem || 0;
  loansEl.innerHTML = (bank || micro)
    ? `<div class="state-section-title" style="margin-top:6px">Борги</div>
       ${bank  ? `<div class="state-row">
                    <span class="state-lbl">Банк</span>
                    <span class="state-val" style="color:var(--red)">$${bank}</span>
                  </div>` : ''}
       ${micro ? `<div class="state-row">
                    <span class="state-lbl">Мікрокредит</span>
                    <span class="state-val" style="color:var(--red)">$${micro}</span>
                  </div>` : ''}`
    : '';
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(e => console.warn('SW:', e));
}
</script>
